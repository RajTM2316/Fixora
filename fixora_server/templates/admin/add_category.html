{% extends "base.html" %}
{% block title %}Fixora | Add Service Category{% endblock %}

{% block extra_css %}
<style>
    .glass-card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 1);
        box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
    }

    .file-drop-zone {
        transition: all 0.3s ease;
        background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%234F46E5FF' stroke-width='2' stroke-dasharray='12%2c 12' stroke-linecap='square'/%3e%3c/svg%3e");
    }

    .file-drop-zone:hover {
        background-color: rgba(79, 70, 229, 0.05);
        transform: scale(1.01);
    }
</style>
{% endblock %}

{% block content %}

<div class="min-h-screen flex items-center justify-center py-10 px-4">
    <div class="glass-card rounded-3xl p-10 w-full max-w-xl">

        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-indigo-500 to-indigo-600 text-white mb-4 shadow-lg">
                <i class="fa-solid fa-layer-group text-xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-brand-dark">
                Add Service Category
            </h2>
            <p class="text-gray-500 text-sm mt-1">
                Create a new service offering for Fixora.
            </p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">
                    Category Name
                </label>
                <input type="text" name="name" required
                       class="w-full px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-action">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">
                    Description
                </label>
                <textarea name="description" rows="3"
                          class="w-full px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-action"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="text" name="estimated_price" placeholder="Estimated Price"
                       class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-action">
                <input type="text" name="estimated_time" placeholder="Estimated Time"
                       class="px-4 py-3 bg-slate-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-action">
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">
                    Category Image
                </label>
                <input type="file" name="image"
                       class="w-full border border-gray-200 rounded-xl p-3">
            </div>

            <button type="submit"
                    class="w-full bg-brand-action hover:bg-brand-dark text-white py-3.5 rounded-xl font-semibold transition-all">
                Create Category
            </button>
        </form>

    </div>
</div>

{% endblock %}
