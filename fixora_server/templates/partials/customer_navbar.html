            </div>

            <span class="text-2xl font-extrabold text-brand-dark tracking-tight">

        </a>

        <!-- Desktop Menu -->
        <div class="hidden md:flex items-center gap-8">

            <a href="{% url 'manage_service:customer_home' %}" class="text-brand-action font-bold text-sm">

        <div class="flex items-center gap-4">

            <button onclick="getLocation()"

            <a
