<header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">

        <!-- Logo -->
        <div class="flex items-center gap-2">
            <div
                class="w-8 h-8 bg-brand-action rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-md">
                <i class="fa-solid fa-wrench text-sm"></i>
            </div>

            <span class="font-bold text-xl text-brand-dark tracking-tight">
                Fixora<span class="text-brand-action">Provider</span>
            </span>
        </div>

        <!-- User Section -->
        <div class="flex items-center gap-4">

            <a
                class="flex items-center gap-3 pl-1 pr-4 py-1 rounded-full border border-gray-200 bg-white hover:shadow-md transition-all tap-effect">

                {% if request.user.profile.profile_picture %}
                <img src="{{ request.user.profile.profile_picture.url }}"
                    class="w-8 h-8 rounded-full object-cover border border-gray-200">
                {% else %}
                <img src="/media/profile_image/default.jpg"
                    class="w-8 h-8 rounded-full object-cover border border-gray-200">
                {% endif %}

                <div class="hidden sm:flex flex-col">
                    <span class="text-[10px] text-gray-400 font-semibold uppercase leading-none">
                        Hello
                    </span>

                    <span class="text-xs font-bold text-brand-dark leading-none">
                        {{ request.user.username }}
                    </span>
                </div>

            </a>

            <a href="{% url 'logout' %}"
                class="bg-gray-900 hover:bg-black text-white text-sm font-semibold px-4 py-2 rounded-md flex items-center gap-2 transition">
                <i class="fa-solid fa-arrow-right-from-bracket text-xs"></i>
                Logout
            </a>

        </div>
    </div>
</header>
