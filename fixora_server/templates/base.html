<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Fixora{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            dark: '#0f172a',
                            primary: '#0066ff',
                            action: '#4f46e5',
                            success: '#10b981',
                            danger: '#ef4444',
                            surface: '#f8fafc'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Global Styles -->
    <style>
        .tap-effect:active { transform: scale(0.96); }

        .card-interactive {
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        }

        .card-interactive:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px -5px rgba(79,70,229,0.15);
        }

        .glass-panel {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="bg-brand-surface min-h-screen flex flex-col">

    <!-- Global Messages -->
    {% if messages %}
    <div class="max-w-7xl mx-auto w-full px-6 mt-4">
        {% for message in messages %}
        <div class="auto-hide-alert mb-3 p-3 rounded-xl text-sm font-semibold text-center border
            {% if 'success' in message.tags %}
                bg-green-50 text-green-600 border-green-200
            {% elif 'error' in message.tags %}
                bg-red-50 text-red-600 border-red-200
            {% elif 'warning' in message.tags %}
                bg-yellow-50 text-yellow-700 border-yellow-200
            {% else %}
                bg-blue-50 text-blue-600 border-blue-200
            {% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Page Content -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- Global Scripts -->
    <script>
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendPosition, showError);
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        function sendPosition(position) {
            fetch("/manage_service/api/save-location/", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === "success") {
                    window.location.href = "{% url 'manage_service:location_map' %}";
                } else {
                    alert("Error saving location.");
                }
            });
        }

        function showError() {
            alert("Please allow location access.");
        }
    </script>

    <!-- Auto-hide Messages -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            setTimeout(function () {
                const alerts = document.querySelectorAll(".auto-hide-alert");

                alerts.forEach(function (alert) {
                    alert.style.transition = "all 0.5s ease";
                    alert.style.opacity = "0";
                    alert.style.transform = "translateY(-10px)";
                    setTimeout(() => alert.remove(), 500);
                });

            }, 3000);
        });
    </script>

    {% block extra_js %}{% endblock %}

</body>
</html>
