<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        :root {
            --primary-green: #2ecc71;
            --dark-text: #2c3e50;
            --bg-color: #f4f7f6;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Prevents scrollbars during animation */
        }

        /* The Animation Logic */
        @keyframes slideUpFade {
            0% {
                transform: translateY(100vh); /* Start off-screen at bottom */
                opacity: 0;
            }
            60% {
                transform: translateY(-20px); /* Slight overshoot for a "bounce" effect */
                opacity: 1;
            }
            100% {
                transform: translateY(0); /* Settle at middle */
                opacity: 1;
            }
        }

        .success-card {
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            
            /* Applying the animation */
            animation: slideUpFade 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: var(--primary-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }

        h1 {
            color: var(--dark-text);
            margin-bottom: 10px;
            font-size: 2rem;
        }

        p {
            color: #7f8c8d;
            margin-bottom: 30px;
        }

        .btn-back {
            display: inline-block;
            text-decoration: none;
            background-color: var(--dark-text);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn-back:hover {
            background-color: #34495e;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-circle">✓</div>
        <h1>Payment Successful</h1>
        <p>Thank you! Your transaction was processed successfully.</p>
        <a href="/" class="btn-back">Go Back Home</a>
    </div>

</body>
</html>
