{% extends "base.html" %}
{% block title %}Fixora | Sign Up{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gray-100 p-6">

    <div class="w-full max-w-lg bg-white rounded-[30px] shadow-xl overflow-hidden">

        <div class="bg-gradient-to-br from-brand-primary to-brand-action p-8 text-white">
            <h2 class="text-3xl font-bold">Fixora</h2>
            <p class="text-sm opacity-90 mt-1">Join our professional network</p>
        </div>

        <div class="p-8">

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- Role Toggle -->
                <div class="flex bg-gray-100 rounded-xl p-1 mb-6">
                    <button type="button"
                        class="flex-1 py-2 rounded-lg font-semibold"
                        onclick="setRole('customer', this)">
                        Customer
                    </button>
                    <button type="button"
                        class="flex-1 py-2 rounded-lg font-semibold"
                        onclick="setRole('provider', this)">
                        Provider
                    </button>
                </div>

                <input type="hidden" name="role" id="role_input" value="customer">

                <!-- Account Info -->
                <label class="text-xs font-bold text-gray-400 uppercase">Username</label>
                <input type="text" name="username" required
                    class="w-full p-3 border rounded-xl mb-4">

                <label class="text-xs font-bold text-gray-400 uppercase">Email</label>
                <input type="email" name="email" required
                    class="w-full p-3 border rounded-xl mb-4">

                <label class="text-xs font-bold text-gray-400 uppercase">Password</label>
                <input type="password" name="password" required
                    class="w-full p-3 border rounded-xl mb-4">

                <label class="text-xs font-bold text-gray-400 uppercase">Profile Picture</label>
                <input type="file" name="profile_picture"
                    class="w-full p-2 border rounded-xl mb-4">

                <!-- Provider Category -->
                <div id="category-section" style="display:none;">
                    <label class="text-xs font-bold text-gray-400 uppercase">Service Category</label>
                    <select name="category" class="w-full p-3 border rounded-xl mb-4">
                        <option value="">Choose service</option>
                        {% for cat in categories %}
                            <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-brand-action to-brand-primary text-white font-bold py-3 rounded-xl mt-4">
                    Register Now
                </button>

                <p class="text-center text-sm text-gray-500 mt-6">
                    Already a member?
                    <a href="{% url 'login' %}" class="text-brand-action font-bold hover:underline">
                        Sign in
                    </a>
                </p>

            </form>
        </div>
    </div>
</div>

<script>
function setRole(role, btn) {
    document.getElementById('role_input').value = role;

    const section = document.getElementById("category-section");
    if (role === "provider") {
        section.style.display = "block";
    } else {
        section.style.display = "none";
    }
}
</script>

{% endblock %}
